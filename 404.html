<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found — Antablin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230d1117'/><rect x='2' y='2' width='60' height='60' rx='10' fill='none' stroke='%23c9a84c' stroke-width='2' opacity='0.5'/><text x='32' y='43' font-family='serif' font-weight='700' font-size='30' fill='%23c9a84c' text-anchor='middle'>A</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Raleway:wght@300;400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #d1d5db;
            font-family: 'Raleway', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .code {
            font-family: 'Cormorant Garamond', serif;
            font-size: 6rem;
            font-weight: 700;
            color: #c9a84c;
            text-shadow: 0 0 30px rgba(201, 168, 76, 0.2);
            line-height: 1;
            margin-bottom: 12px;
        }
        .msg {
            font-weight: 300;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 30px;
        }
        a {
            color: #c9a84c;
            text-decoration: none;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 14px;
            border-bottom: 1px solid rgba(201, 168, 76, 0.3);
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }
        a:hover {
            border-color: #c9a84c;
            text-shadow: 0 0 10px rgba(201, 168, 76, 0.3);
        }
    </style>
</head>
<body>
    <div>
        <div class="code">404</div>
        <p class="msg">Page not found</p>
        <a href="/">Return Home</a>
    </div>
</body>
</html>
